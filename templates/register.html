{% extends 'base.html' %}
{% block title %}회원가입{% endblock %}
{% block content %}

<div class="auth-card">
  <div class="auth-logo">💌</div>
  <h1 class="auth-title">회원가입</h1>
  <p class="auth-sub">LetterBox에 오신 것을 환영합니다</p>

  <form method="POST" action="{{ url_for('register') }}" class="auth-form">
    <div class="form-group">
      <label class="form-label" for="username">아이디</label>
      <input class="form-input" type="text" id="username" name="username"
             placeholder="사용할 아이디 입력" required autofocus />
    </div>
    <div class="form-group">
      <label class="form-label" for="email">이메일</label>
      <input class="form-input" type="email" id="email" name="email"
             placeholder="이메일 주소 입력" required />
    </div>
    <div class="form-group">
      <label class="form-label" for="password">비밀번호</label>
      <input class="form-input" type="password" id="password" name="password"
             placeholder="비밀번호 입력" required />
    </div>
    <button type="submit" class="btn btn-primary btn-full">가입하기</button>
  </form>

  <p class="auth-switch">이미 계정이 있으신가요? <a href="{{ url_for('login') }}">로그인</a></p>
</div>

{% endblock %}
