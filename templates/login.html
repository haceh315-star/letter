{% extends 'base.html' %}
{% block title %}로그인{% endblock %}
{% block content %}

<div class="auth-card">
  <div class="auth-logo">💌</div>
  <h1 class="auth-title">LetterBox</h1>
  <p class="auth-sub">마음을 담아, 편지로 전하세요</p>

  <form method="POST" action="{{ url_for('login') }}" class="auth-form">
    <div class="form-group">
      <label class="form-label" for="username">아이디</label>
      <input class="form-input" type="text" id="username" name="username"
             placeholder="아이디를 입력하세요" required autofocus />
    </div>
    <div class="form-group">
      <label class="form-label" for="password">비밀번호</label>
      <input class="form-input" type="password" id="password" name="password"
             placeholder="비밀번호를 입력하세요" required />
    </div>
    <button type="submit" class="btn btn-primary btn-full">로그인</button>
  </form>

  <p class="auth-switch">계정이 없으신가요? <a href="{{ url_for('register') }}">회원가입</a></p>
</div>

{% endblock %}
